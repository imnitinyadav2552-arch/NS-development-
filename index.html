<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cobra Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="top">
<img src="icon.png" class="icon">
<div class="info">
<h2 id="appName">CobraWeb-Browser</h2>
<p>Developed by NS Development • <span id="size">--</span></p>
</div>
</div>

<div class="button-container">
<div class="glow-ring"></div>
<div class="downloadBtn" id="downloadBtn">Download</div>
</div>

<div class="screenshots">
<img src="screen1.png">
<img src="screen2.png">
<img src="screen3.png">
</div>

<div class="section">
<div class="accordionHeader" id="aboutToggle">
<h2>About</h2>
<span id="arrow">▶</span>
</div>
<div class="accordionContent" id="about"></div>
</div>

<div class="section">
<h2>Details</h2>
<div class="details">
<p><b>App Name</b><span id="detailName"></span></p>
<p><b>Version</b><span id="version"></span></p>
<p><b>Android Support</b><span id="android"></span></p>
<p><b>Package</b><span id="package"></span></p>
<p><b>Architecture</b><span id="arch"></span></p>
<p><b>Permissions</b><span id="perm"></span></p>
</div>
</div>

</div>

<div class="popup" id="popup"><img id="popupImg"></div>

<script src="script.js"></script>

</body>
</html>
